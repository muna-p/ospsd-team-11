version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install ruff
          command: |
            python -m pip install --upgrade pip
            pip install ruff
      - run:
          name: Run lint
          command: |
            ruff check .

workflows:
  lint_only:
    jobs:
      - lint


