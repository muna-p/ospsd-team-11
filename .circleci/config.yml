version: 2.1

jobs:
  build:
    docker:
        - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: "Install UV and Add to Path"
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version # Verify installation
      - run:
          name: "Create Virtual Env & Install All Dependencies via UV Sync"
          command: |
            # Create venv in the default .venv location
            uv venv --python 3.13
            source .venv/bin/activate
            # Install all dependencies including dev/test extras
            uv sync --all-packages --extra dev --verbose
      - run:
          name: "Verify Installation"
          command: |
            source .venv/bin/activate
            uv tree
            ruff --version
            pytest --version
            mypy --version
            coverage --version
      - persist_to_workspace:
          # Persist the entire project directory, including the populated .venv
          root: .
          paths:
            - .
  lint:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run lint
          command: |
            source .venv/bin/activate
            ruff check .

  types:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run mypy type checking
          command: |
            source .venv/bin/activate
            mypy .

  unit_tests:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run unit tests per component
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit
            for d in components/*; do
              if [ -d "$d/tests" ]; then
                name="$(basename "$d")"
                echo "=== Running unit tests for $name ==="
                pytest "$d/tests" -v \
                  --junitxml "test-results/unit/${name}.xml" \
                  --cov=components --cov-report=term --cov-report=html
              fi
            done
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: htmlcov
          destination: coverage-report

  
  integration_tests:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run integration tests
          command: |
            source .venv/bin/activate
            mkdir -p test-results/integration
            pytest tests/integration -v \
              --junitxml test-results/integration/results.xml
      - store_test_results:
          path: test-results

  e2e_tests:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run E2E tests
          command: |
            source .venv/bin/activate
            mkdir -p test-results/e2e
            pytest tests/e2e -v \
              --junitxml test-results/e2e/results.xml
      - store_test_results:
          path: test-results


workflows:
  lint_types_tests:
    jobs:
      - build
      - lint:
          requires:
            - build
      - types:
          requires:
            - build
      - unit_tests:
          requires:
            - build
      - integration_tests:
          requires:
            - unit_tests
      - e2e_tests:
          requires:
            - integration_tests


